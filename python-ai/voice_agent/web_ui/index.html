<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis</title>
<style>
  :root {
    --bg: #0a0c14;
    --panel: #12162399;
    --panel-solid: #12162a;
    --accent: #4fd6ff;
    --accent2: #6c5ce7;
    --text-muted: #8b93a7;
    --listening: #3ddc97;
    --thinking: #a55cff;
    --speaking: #4fd6ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(ellipse at 50% -10%, #1a2036 0%, var(--bg) 60%);
    color: #fff;
    font-family: "Segoe UI", "Segoe UI Semibold", Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 28px 24px 20px;
  }

  .title {
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* ---------- Orb ---------- */

  .orb-stage {
    position: relative;
    width: 260px;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 6px;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0.35;
    transition: border-color 0.6s ease, opacity 0.6s ease;
  }
  .ring1 { width: 100%; height: 100%; animation: spin 18s linear infinite; }
  .ring2 { width: 82%; height: 82%; border-style: dashed; opacity: 0.25;
           animation: spin 12s linear infinite reverse; }
  .ring3 { width: 66%; height: 66%; opacity: 0.5; animation: spin 9s linear infinite; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .orb {
    position: relative;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #eafcff 0%, var(--accent) 34%, #1c6c85 78%, #0c2733 100%);
    box-shadow:
      0 0 30px 6px rgba(79, 214, 255, 0.55),
      0 0 70px 18px rgba(79, 214, 255, 0.25),
      inset 0 0 30px rgba(255, 255, 255, 0.25);
    animation: breathe 4.2s ease-in-out infinite;
    transition: box-shadow 0.6s ease, background 0.6s ease;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.045); }
  }

  .particle {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.8;
    animation: orbit linear infinite;
  }
  @keyframes orbit {
    from { transform: rotate(0deg) translateX(118px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(118px) rotate(-360deg); }
  }

  /* ---------- State variants ---------- */

  .app.listening .ring { border-color: var(--listening); }
  .app.listening .orb {
    background: radial-gradient(circle at 38% 32%, #f2fff8 0%, var(--listening) 34%, #146349 78%, #072019 100%);
    box-shadow: 0 0 34px 8px rgba(61, 220, 151, 0.6), 0 0 80px 20px rgba(61, 220, 151, 0.28),
      inset 0 0 30px rgba(255,255,255,0.25);
    animation: breathe 1.6s ease-in-out infinite;
  }
  .app.listening .particle { background: var(--listening); }

  .app.thinking .ring { border-color: var(--thinking); }
  .app.thinking .ring1 { animation-duration: 3s; }
  .app.thinking .ring2 { animation-duration: 2.4s; }
  .app.thinking .ring3 { animation-duration: 1.8s; }
  .app.thinking .orb {
    background: radial-gradient(circle at 38% 32%, #f5eeff 0%, var(--thinking) 34%, #4a1e8a 78%, #180a2e 100%);
    box-shadow: 0 0 34px 8px rgba(165, 92, 255, 0.6), 0 0 80px 20px rgba(165, 92, 255, 0.28),
      inset 0 0 30px rgba(255,255,255,0.25);
    animation: breathe 0.9s ease-in-out infinite;
  }
  .app.thinking .particle { background: var(--thinking); }

  .app.speaking .orb {
    animation: speak-pulse 0.35s ease-in-out infinite;
    box-shadow: 0 0 40px 10px rgba(79, 214, 255, 0.75), 0 0 90px 26px rgba(79, 214, 255, 0.35),
      inset 0 0 30px rgba(255,255,255,0.3);
  }
  @keyframes speak-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .app.speaking .ring { opacity: 0.6; }

  /* ---------- Status ---------- */

  .status {
    margin-top: 22px;
    font-size: 13.5px;
    color: var(--text-muted);
    text-align: center;
    min-height: 40px;
    max-width: 380px;
    line-height: 1.5;
  }

  .state-label {
    margin-top: 2px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .app.listening .state-label { color: var(--listening); }
  .app.thinking .state-label { color: var(--thinking); }
  .app.speaking .state-label { color: var(--speaking); }

  /* ---------- Command input ---------- */

  .command-row {
    margin-top: auto;
    width: 100%;
    max-width: 400px;
    display: flex;
    gap: 8px;
  }

  input[type="text"], input[type="password"] {
    background: #1a1f30;
    border: 1px solid #2a3145;
    color: #fff;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13.5px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent);
  }

  .command-row input[type="text"] { flex: 1; }

  button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #05070d;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
  }
  button:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.96); }

  /* ---------- Figma panel ---------- */

  .figma-panel {
    margin-top: 16px;
    width: 100%;
    max-width: 400px;
    background: var(--panel);
    border: 1px solid #23293c;
    border-radius: 14px;
    padding: 14px 16px;
    backdrop-filter: blur(6px);
  }
  .figma-panel .heading {
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .figma-field { margin-bottom: 8px; }
  .figma-field label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .figma-field input { width: 100%; }
  .figma-row { display: flex; gap: 8px; align-items: flex-end; margin-top: 8px; }
  .figma-row > div:first-child { flex: 1; }
  .save-msg { font-size: 11.5px; color: var(--listening); margin-top: 8px; min-height: 14px; }
</style>
</head>
<body>
  <div class="app state-idle" id="app">
    <div class="title">JARVIS</div>

    <div class="orb-stage">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <div class="particle" style="animation-duration: 6s;"></div>
      <div class="particle" style="animation-duration: 8s; animation-delay: -2s;"></div>
      <div class="particle" style="animation-duration: 10s; animation-delay: -5s;"></div>
      <div class="orb" id="orb"></div>
    </div>

    <div class="status" id="status">Starting up...</div>
    <div class="state-label" id="stateLabel">IDLE</div>

    <div class="command-row">
      <input type="text" id="commandInput" placeholder="Or type a command..." />
      <button id="sendBtn">Send</button>
    </div>

    <div class="figma-panel">
      <div class="heading">Figma connection</div>
      <div class="figma-field">
        <label>Figma token</label>
        <input type="password" id="figmaToken" placeholder="Paste your Figma personal access token" />
      </div>
      <div class="figma-field">
        <label>Figma file key</label>
        <input type="text" id="figmaFileKey" placeholder="Paste your Figma file key" />
      </div>
      <div class="figma-row">
        <div></div>
        <button id="saveFigmaBtn">Save</button>
      </div>
      <div class="save-msg" id="saveMsg"></div>
    </div>
  </div>

<script>
  const appEl = document.getElementById('app');
  const statusEl = document.getElementById('status');
  const stateLabelEl = document.getElementById('stateLabel');
  const commandInput = document.getElementById('commandInput');
  const sendBtn = document.getElementById('sendBtn');
  const figmaToken = document.getElementById('figmaToken');
  const figmaFileKey = document.getElementById('figmaFileKey');
  const saveFigmaBtn = document.getElementById('saveFigmaBtn');
  const saveMsg = document.getElementById('saveMsg');

  function setState(state) {
    appEl.classList.remove('idle', 'listening', 'thinking', 'speaking');
    appEl.classList.add(state);
    stateLabelEl.textContent = state.toUpperCase();
  }

  function updateStatus(text) {
    statusEl.textContent = text;
  }

  function submitCommand() {
    const text = commandInput.value.trim();
    if (!text) return;
    commandInput.value = '';
    window.pywebview.api.submit_command(text);
  }

  sendBtn.addEventListener('click', submitCommand);
  commandInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitCommand();
  });

  saveFigmaBtn.addEventListener('click', () => {
    window.pywebview.api.save_figma(figmaToken.value.trim(), figmaFileKey.value.trim())
      .then(() => {
        saveMsg.textContent = 'Saved. You can build a new site from this design now.';
        setTimeout(() => { saveMsg.textContent = ''; }, 4000);
      });
  });

  window.addEventListener('pywebviewready', () => {
    window.pywebview.api.get_config().then((cfg) => {
      figmaToken.value = cfg.figma_token || '';
      figmaFileKey.value = cfg.figma_file_key || '';
    });
  });
</script>
</body>
</html>
